{% extends 'dairysync/base.html' %}

{% block content %}
<div class="topbar">
    <div class="topbar-left">
        <h1>Password Changed</h1>
        <p>Your account is up to date</p>
    </div>
</div>

<div class="form-box" style="margin:24px;text-align:center">
    <div style="width:52px;height:52px;border-radius:50%;background:#dcfce7;border:1px solid #bbf7d0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#16a34a">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
    </div>
    <p style="font-size:15px;font-weight:bold;color:#111827;margin-bottom:8px">Password updated successfully</p>
    <p style="font-size:13px;color:#6b7280;margin-bottom:24px">Your password has been changed. Use it the next time you log in.</p>
    <a href="{% url 'dashboard' %}" class="btn">Back to Dashboard</a>
</div>
{% endblock %}
