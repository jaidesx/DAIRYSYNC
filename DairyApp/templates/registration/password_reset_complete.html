{% extends 'registration/auth_base.html' %}
{% block page_title %}Password Reset Complete{% endblock %}

{% block card_content %}
<div class="success-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
    </svg>
</div>

<div class="card-heading">Password updated</div>
<div class="card-subtext">
    Your password has been set successfully. You can now log in with your new credentials.
</div>

<a href="{% url 'login' %}" class="auth-btn" style="display:block;text-align:center;text-decoration:none;margin-top:8px;">
    GO TO LOGIN
</a>
{% endblock %}
