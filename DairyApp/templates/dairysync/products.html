{% extends 'dairysync/base.html' %}

{% block content %}

<div class="topbar">

    <h1>Products</h1>

    <a class="btn" href="{% url 'add_product' %}">
        Add Product
    </a>

</div>

<table>

    <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Minimum Stock</th>
        <th>Actions</th>
    </tr>

    {% for product in products %}

    <tr>

        <td>{{ product.name }}</td>

        <td>{{ product.price }}</td>

        <td>{{ product.minimum_stock }}</td>

        <td>

            <a class="btn"
               href="{% url 'edit_product' product.id %}">
               Edit
            </a>

            <a class="btn"
               onclick="return confirm('Delete product?')"
               href="{% url 'delete_product' product.id %}">
               Delete
            </a>

        </td>

    </tr>

    {% empty %}

    <tr>
        <td colspan="4">No products found</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
